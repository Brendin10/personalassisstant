name: Screener Email Digest

on:
  schedule:
    # Every 15 min from 12:00-14:59 UTC = 8:00-10:59am EDT / 7:00-9:59am EST,
    # covering both the DST shift and GitHub's own scheduling lag (observed
    # 45-90+ min delays on this account). The script only actually sends
    # within its own 8:00-11:00am ET window, deduped so only the first
    # matching run per day emails.
    - cron: "*/15 12,13,14 * * 1-5"
  workflow_dispatch: {}  # manual test runs from the Actions tab

permissions:
  contents: read

concurrency:
  group: screener-email
  cancel-in-progress: false

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore send state (dedupe)
        uses: actions/cache/restore@v4
        with:
          path: .email_state.json
          key: screener-email-state-${{ github.run_id }}
          restore-keys: screener-email-state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send digest email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python scripts/send_screener_email.py

      - name: Save send state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .email_state.json
          key: screener-email-state-${{ github.run_id }}
